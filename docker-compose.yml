services:
  php:
    image: php:8.4-fpm-alpine
    container_name: campcomp-php
    restart: unless-stopped
    volumes:
      - ./wiki:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: campcomp-nginx
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "80:80"
    volumes:
      - ./wiki:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    # Optional: keep logs small on SD card
    # logging:
    #   driver: "json-file"
    #   options:
    #     max-size: "5m"
    #     max-file: "2"